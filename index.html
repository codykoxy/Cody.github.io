<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cody Hub — Nothing Style</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=DotGothic16&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'IBM Plex Mono', monospace;
  background:#000;
  color:#e5e7eb;
}

/* subtle dotted grid */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size:18px 18px;
  pointer-events:none;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 24px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(6px);
  position:sticky;top:0;background:rgba(0,0,0,0.6);
}

.brand{
  letter-spacing:2px;
  color:#fff;
}

nav a{
  color:#aaa;
  text-decoration:none;
  margin-left:16px;
}
nav a:hover{color:#fff}

.hero{
  text-align:center;
  padding:80px 20px 40px;
}

/* REAL dot-matrix text */
.dot{
  font-family:'DotGothic16', monospace;
  font-size:52px;
  letter-spacing:6px;
  color:#fff;
  text-shadow:
    0 0 2px #fff,
    0 0 10px rgba(255,255,255,0.7),
    0 0 20px rgba(255,255,255,0.4);
  animation: flicker 2s infinite alternate;
}

@keyframes flicker{
  0%{opacity:1}
  50%{opacity:0.85}
  100%{opacity:1}
}

.sub{
  margin-top:10px;
  color:#9ca3af;
}

.cta{
  margin-top:24px;
  display:inline-block;
  padding:14px 28px;
  border-radius:30px;
  background:#111;
  border:1px solid rgba(255,255,255,0.2);
  color:#fff;
  cursor:pointer;
}
.cta:hover{box-shadow:0 0 12px rgba(255,255,255,0.4)}

.container{max-width:1100px;margin:auto;padding:20px}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:18px;
}

.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;
  padding:18px;
  backdrop-filter:blur(8px);
  transition:.25s;
}
.card:hover{
  transform:translateY(-6px);
  box-shadow:0 0 16px rgba(255,255,255,0.25);
}

h3{color:#fff;font-weight:500}

input,textarea{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.15);
  background:#0b0b0b;
  color:#fff;
}

button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.2);
  background:#111;
  color:#fff;
  cursor:pointer;
}
button:hover{box-shadow:0 0 10px rgba(255,255,255,0.4)}

.result{margin-top:8px;color:#d1d5db}

footer{
  text-align:center;
  padding:24px;
  color:#6b7280;
}
</style>
</head>

<body>

<header>
  <div class="brand">CODY HUB</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="tools.html">Tools</a>
  </nav>
</header>

<section class="hero">
  <div class="dot">CODY HUB</div>
  <div class="sub">Here’s why NOTHING should hire me</div>
  <button class="cta" onclick="document.getElementById('tools').scrollIntoView({behavior:'smooth'})">Explore Tools</button>
</section>

<div class="container" id="tools">
  <div class="grid">

    <div class="card">
      <h3>Word Counter</h3>
      <textarea id="text"></textarea>
      <button onclick="countWords()">Count</button>
      <div class="result" id="wordRes"></div>
    </div>

    <div class="card">
      <h3>Password Generator</h3>
      <input id="len" placeholder="Length">
      <button onclick="genPass()">Generate</button>
      <div class="result" id="passRes"></div>
    </div>

    <div class="card">
      <h3>Case Converter</h3>
      <textarea id="case"></textarea>
      <button onclick="upper()">UPPER</button>
      <button onclick="lower()">lower</button>
    </div>

    <div class="card">
      <h3>CGPA Calculator</h3>
      <input id="marks" placeholder="10,9,8">
      <button onclick="cgpa()">Calculate</button>
      <div class="result" id="cgRes"></div>
    </div>

    <div class="card">
      <h3>Palindrome Checker</h3>
      <input id="pal">
      <button onclick="palin()">Check</button>
      <div class="result" id="palRes"></div>
    </div>

    <div class="card">
      <h3>Random Number</h3>
      <input id="min" placeholder="Min">
      <input id="max" placeholder="Max">
      <button onclick="rand()">Generate</button>
      <div class="result" id="randRes"></div>
    </div>

    <div class="card">
      <h3>Calculator</h3>
      <input id="calc">
      <button onclick="calcFun()">=</button>
      <div class="result" id="calcRes"></div>
    </div>

    <div class="card">
      <h3>Character Counter</h3>
      <textarea id="char"></textarea>
      <button onclick="charCount()">Count</button>
      <div class="result" id="charRes"></div>
    </div>

    <div class="card">
      <h3>Copy Text</h3>
      <textarea id="copy"></textarea>
      <button onclick="copyFun()">Copy</button>
    </div>

  </div>
</div>

<footer>
  © 2026 Cody Hub — Nothing Style
</footer>

<script>
function countWords(){let t=text.value.trim().split(/\s+/).filter(x=>x);wordRes.innerText=t.length}
function genPass(){let l=len.value||8,c="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789",p="";for(let i=0;i<l;i++)p+=c[Math.floor(Math.random()*c.length)];passRes.innerText=p}
function upper(){case.value=case.value.toUpperCase()}
function lower(){case.value=case.value.toLowerCase()}
function cgpa(){let m=marks.value.split(',').map(Number);cgRes.innerText=(m.reduce((a,b)=>a+b)/m.length/10).toFixed(2)}
function palin(){let s=pal.value.toLowerCase().replace(/[^a-z0-9]/g,'');palRes.innerText=(s==s.split('').reverse().join(''))?"Yes":"No"}
function rand(){let a=parseInt(min.value),b=parseInt(max.value);randRes.innerText=Math.floor(Math.random()*(b-a+1))+a}
function calcFun(){try{calcRes.innerText=eval(calc.value)}catch{calcRes.innerText="Error"}}
function charCount(){charRes.innerText=char.value.length}
function copyFun(){copy.select();document.execCommand('copy');alert('Copied')}
</script>

</body>
</html>
