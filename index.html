<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Tools - Cody Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:rgba(2,6,23,0.8);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
}

h1{color:#38bdf8}
nav a{
  color:white;
  margin-left:15px;
  text-decoration:none;
}
nav a:hover{color:#38bdf8}

.container{
  max-width:1100px;
  margin:auto;
  padding:30px 15px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:20px;
  transition:0.3s;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.card:hover{
  transform:translateY(-8px) scale(1.02);
  background:#334155;
}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  font-weight:bold;
  cursor:pointer;
}

button:hover{opacity:0.8}

.result{margin-top:10px;color:#38bdf8;font-weight:600}

footer{
  text-align:center;
  padding:20px;
  color:#94a3b8;
}
</style>
</head>

<body>

<header>
  <h1>Cody Hub</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="tools.html">Tools</a>
  </nav>
</header>

<div class="container">
  <h2 style="text-align:center">🔥 All Tools</h2>

  <div class="grid">

    <div class="card">
      <h3>Word Counter</h3>
      <textarea id="text"></textarea>
      <button onclick="countWords()">Count</button>
      <div class="result" id="wordRes"></div>
    </div>

    <div class="card">
      <h3>Password Generator</h3>
      <input id="len" placeholder="Length">
      <button onclick="genPass()">Generate</button>
      <div class="result" id="passRes"></div>
    </div>

    <div class="card">
      <h3>Case Converter</h3>
      <textarea id="case"></textarea>
      <button onclick="upper()">UPPER</button>
      <button onclick="lower()">lower</button>
    </div>

    <div class="card">
      <h3>CGPA Calculator</h3>
      <input id="marks" placeholder="10,9,8">
      <button onclick="cgpa()">Calculate</button>
      <div class="result" id="cgRes"></div>
    </div>

    <div class="card">
      <h3>Palindrome Checker</h3>
      <input id="pal">
      <button onclick="palin()">Check</button>
      <div class="result" id="palRes"></div>
    </div>

    <div class="card">
      <h3>Random Number</h3>
      <input id="min" placeholder="Min">
      <input id="max" placeholder="Max">
      <button onclick="rand()">Generate</button>
      <div class="result" id="randRes"></div>
    </div>

    <div class="card">
      <h3>Calculator</h3>
      <input id="calc">
      <button onclick="calcFun()">=</button>
      <div class="result" id="calcRes"></div>
    </div>

    <div class="card">
      <h3>Character Counter</h3>
      <textarea id="char"></textarea>
      <button onclick="charCount()">Count</button>
      <div class="result" id="charRes"></div>
    </div>

    <div class="card">
      <h3>Copy Text</h3>
      <textarea id="copy"></textarea>
      <button onclick="copyFun()">Copy</button>
    </div>

  </div>
</div>

<footer>
  © 2026 Cody Hub 🚀
</footer>

<script>
function countWords(){let t=text.value.trim().split(/\s+/).filter(x=>x);wordRes.innerText=t.length}
function genPass(){let l=len.value||8,c="abcABC123!@#",p="";for(let i=0;i<l;i++)p+=c[Math.floor(Math.random()*c.length)];passRes.innerText=p}
function upper(){case.value=case.value.toUpperCase()}
function lower(){case.value=case.value.toLowerCase()}
function cgpa(){let m=marks.value.split(',').map(Number);cgRes.innerText=(m.reduce((a,b)=>a+b)/m.length/10).toFixed(2)}
function palin(){let s=pal.value.toLowerCase();palRes.innerText=(s==s.split('').reverse().join(''))?"Yes":"No"}
function rand(){let a=parseInt(min.value),b=parseInt(max.value);randRes.innerText=Math.floor(Math.random()*(b-a+1))+a}
function calcFun(){try{calcRes.innerText=eval(calc.value)}catch{calcRes.innerText="Error"}}
function charCount(){charRes.innerText=char.value.length}
function copyFun(){copy.select();document.execCommand('copy');alert('Copied')}
</script>

</body>
</html>
